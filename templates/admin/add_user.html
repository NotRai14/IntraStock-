{% extends 'base.html' %}

{% block title %}Add User - Inventory Management{% endblock %}
{% block page_title %}Add New User{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card">
            <form method="POST" action="{{ url_for('admin_add_user') }}" id="addUserForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name </label>
                        <input type="text" name="username" class="form-control" placeholder="Enter full name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address </label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password </label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required minlength="6">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" id="roleSelect" required>
                            <option value="">Select role</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="staff">Staff</option>
                            <option value="supplier">Supplier</option>
                        </select>
                    </div>
                </div>
                
                <!-- Staff specific field -->
                <div class="mb-3 role-field" id="staffField" style="display: none;">
                    <label class="form-label">Assigned Manager</label>
                    <select name="manager_id" class="form-select">
                        <option value="">Select manager</option>
                        {% for manager in managers %}
                        <option value="{{ manager._id }}">{{ manager.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Supplier specific fields -->
                <div class="role-field" id="supplierFields" style="display: none;">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control" placeholder="Enter company name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="tel" name="contact_number" class="form-control" placeholder="Enter contact number">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2" placeholder="Enter business address"></textarea>
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>Add User
                    </button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('roleSelect').addEventListener('change', function() {
        document.querySelectorAll('.role-field').forEach(el => el.style.display = 'none');
        
        if (this.value === 'staff') {
            document.getElementById('staffField').style.display = 'block';
        } else if (this.value === 'supplier') {
            document.getElementById('supplierFields').style.display = 'block';
        }
    });
</script>
{% endblock %}
