{% extends 'base.html' %}

{% block title %}Edit Category - Inventory Management{% endblock %}
{% block page_title %}Edit Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card">
            <form method="POST" action="{{ url_for('edit_category', category_id=category._id) }}">
                <div class="mb-3">
                    <label class="form-label">Category Name </label>
                    <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ category.description or '' }}</textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>Save Changes
                    </button>
                    <a href="{{ url_for('categories') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
