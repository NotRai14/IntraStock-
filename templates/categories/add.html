{% extends 'base.html' %}

{% block title %}Add Category - Inventory Management{% endblock %}
{% block page_title %}Add New Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="form-card">
            <form method="POST" action="{{ url_for('add_category') }}">
                <div class="mb-3">
                    <label class="form-label">Category Name </label>
                    <input type="text" name="name" class="form-control" placeholder="Enter category name" value="{{ name or '' }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Enter category description">{{ description or '' }}</textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>Add Category
                    </button>
                    <a href="{{ url_for('categories') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
