{% extends 'base.html' %}

{% block title %}New Request - Inventory Management{% endblock %}
{% block page_title %}Create New Request{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card">
            <form method="POST" action="{{ url_for('create_request') }}" id="requestForm">
                <div class="mb-4">
                    <label class="form-label">Reason for Request</label>
                    <textarea name="reason" class="form-control" rows="2" placeholder="Enter the reason for this request"></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Items Requested *</label>
                    <div id="itemsContainer">
                        <div class="item-row mb-2">
                            <div class="row g-2">
                                <div class="col-md-8">
                                    <select name="product_id[]" class="form-select" required>
                                        <option value="">Select a product</option>
                                        {% for product in products %}
                                        <option value="{{ product._id }}">{{ product.name }} (Stock: {{ product.stock }})</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <input type="number" name="quantity[]" class="form-control" placeholder="Qty" min="1" required>
                                </div>
                                <div class="col-md-1">
                                    <button type="button" class="btn btn-outline-danger w-100 remove-item" style="display: none;">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-primary btn-sm mt-2" id="addItem">
                        <i class="bi bi-plus me-1"></i>Add Another Item
                    </button>
                </div>
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send me-2"></i>Submit Request
                    </button>
                    <a href="{{ url_for('requests_list') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    document.getElementById('addItem').addEventListener('click', function() {
        const container = document.getElementById('itemsContainer');
        const firstRow = container.querySelector('.item-row');
        const newRow = firstRow.cloneNode(true);
        
        // Reset values
        newRow.querySelector('select').value = '';
        newRow.querySelector('input[type="number"]').value = '';
        
        // Show remove button
        newRow.querySelector('.remove-item').style.display = 'block';
        
        container.appendChild(newRow);
        updateRemoveButtons();
    });
    
    document.getElementById('itemsContainer').addEventListener('click', function(e) {
        if (e.target.closest('.remove-item')) {
            e.target.closest('.item-row').remove();
            updateRemoveButtons();
        }
    });
    
    function updateRemoveButtons() {
        const rows = document.querySelectorAll('.item-row');
        rows.forEach((row, index) => {
            const removeBtn = row.querySelector('.remove-item');
            if (rows.length > 1) {
                removeBtn.style.display = 'block';
            } else {
                removeBtn.style.display = 'none';
            }
        });
    }
</script>
{% endblock %}
{% endblock %}
