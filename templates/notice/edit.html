{% extends 'base.html' %}

{% block title %}Edit Notice - Inventory Management{% endblock %}
{% block page_title %}Edit Notice{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card">
            <form method="POST" action="{{ url_for('edit_notice', notice_id=notice._id) }}">
                <div class="mb-3">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-control" value="{{ notice.title }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Content *</label>
                    <textarea name="content" class="form-control" rows="6" required>{{ notice.content }}</textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="normal" {% if notice.priority == 'normal' %}selected{% endif %}>Normal</option>
                            <option value="high" {% if notice.priority == 'high' %}selected{% endif %}>High</option>
                            <option value="low" {% if notice.priority == 'low' %}selected{% endif %}>Low</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Target Audience</label>
                        <div class="d-flex flex-wrap gap-3">
                            <div class="form-check">
                                <input type="checkbox" name="target_roles" value="admin" class="form-check-input" id="roleAdmin" {% if 'admin' in (notice.target_roles or []) %}checked{% endif %}>
                                <label class="form-check-label" for="roleAdmin">Admin</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="target_roles" value="manager" class="form-check-input" id="roleManager" {% if 'manager' in (notice.target_roles or []) %}checked{% endif %}>
                                <label class="form-check-label" for="roleManager">Manager</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="target_roles" value="staff" class="form-check-input" id="roleStaff" {% if 'staff' in (notice.target_roles or []) %}checked{% endif %}>
                                <label class="form-check-label" for="roleStaff">Staff</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" name="target_roles" value="supplier" class="form-check-input" id="roleSupplier" {% if 'supplier' in (notice.target_roles or []) %}checked{% endif %}>
                                <label class="form-check-label" for="roleSupplier">Supplier</label>
                            </div>
                        </div>
                        <small class="text-muted">Leave empty to show to all users</small>
                    </div>
                </div>
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>Save Changes
                    </button>
                    <a href="{{ url_for('notices') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
